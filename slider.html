<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SLV Slider</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* WRAPPER */
.wrapper {
  position: relative;
  width: 100%;
  max-width: 500px;
}

/* SLIDER */
.slider {
  overflow: hidden;
  border-radius: 12px;
}

.track {
  display: flex;
  transition: transform 0.4s ease;
}

/* CARD */
.card {
  min-width: 100%;
  background: #303030;
  padding: 20px;
  text-align: center;
  box-sizing: border-box;
}

.team {
  font-size: 18px;
  margin: 10px 0;
}

.score {
  font-size: 32px;
  font-weight: bold;
  color: #FFFFFF;
}

/* BUTTONS */
.btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  font-size: 24px;
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

#prev { left: -50px; }
#next { right: -50px; }

</style>
</head>

<body>

<div class="wrapper">

  <button class="btn" id="prev">‹</button>

  <div class="slider">
    <div class="track" id="track"></div>
  </div>

  <button class="btn" id="next">›</button>

</div>
<script>

let index = 0;
let matches = [];
let interval;

/* -------------------------
   PARAM JSON
--------------------------*/
function getParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

/* -------------------------
   LOAD DATA
--------------------------*/
async function loadData() {

  const file = getParam("json") || "slast";
  const path = `data/${file}.json`;

  const res = await fetch(path);
  const data = await res.json();

  matches = data.partidos || [];

  const track = document.getElementById("track");

  track.innerHTML = matches.map(m => `
    <div class="card">
      <div class="team">${m.local || "?"}</div>
      <div class="score">${m.resultado || "VS"}</div>
      <div class="team">${m.visitante || "?"}</div>
    </div>
  `).join("");

  startAuto();
  update();
}

/* -------------------------
   UPDATE SLIDE
--------------------------*/
function update() {
  const track = document.getElementById("track");
  track.style.transform = `translateX(-${index * 100}%)`;
}

/* -------------------------
   AUTOPLAY LOOP
--------------------------*/
function startAuto() {

  if (interval) clearInterval(interval);

  interval = setInterval(() => {

    if (matches.length === 0) return;

    index++;

    if (index >= matches.length) {
      index = 0; // 🔥 LOOP INFINITO
    }

    update();

  }, 3000); // cada 3 segundos
}

/* -------------------------
   BOTONES MANUAL
--------------------------*/
document.getElementById("next").onclick = () => {
  index = (index + 1) % matches.length;
  update();
};

document.getElementById("prev").onclick = () => {
  index = (index - 1 + matches.length) % matches.length;
  update();
};

loadData();

</script>

</body>
</html>
