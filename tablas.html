<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SLV League</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.selector {
  text-align: center;
  margin-bottom: 20px;
}

select {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.table {
  max-width: 800px;
  margin: auto;
}

.row {
  display: grid;
  grid-template-columns: 40px 1fr 50px 50px 50px;
  gap: 10px;
  padding: 10px;
  border-bottom: 1px solid #222;
  align-items: center;
}

.row.header {
  font-weight: bold;
  color: #aaa;
}

.pos {
  font-weight: bold;
  text-align: center;
}

.team {
  display: flex;
  align-items: center;
  gap: 10px;
}

.badge {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.top1 { background: gold; }
.top4 { background: #00ff88; }
.mid { background: #888; }
.bottom { background: red; }

.pts {
  font-weight: bold;
}
</style>
</head>

<body>

<h1>SLV League</h1>

<div class="selector">
  <select id="ligaSelect">
    <option value="primera.json">Primera</option>
    <option value="segunda.json">Segunda</option>
  </select>
</div>

<div class="table" id="table"></div>

<script>

async function loadLiga(file) {

  const res = await fetch("data/" + file);
  const data = await res.json();

  const table = document.getElementById("table");

  let html = `
    <div class="row header">
      <div>#</div>
      <div>Equipo</div>
      <div>PJ</div>
      <div>DG</div>
      <div>PTS</div>
    </div>
  `;

  data.table.forEach(team => {

    let cls = "mid";

    if (team.pos === 1) cls = "top1";
    else if (team.pos <= 4) cls = "top4";
    else if (team.pos >= 13) cls = "bottom";

    html += `
      <div class="row">
        <div class="pos">${team.pos}</div>

        <div class="team">
          <div class="badge ${cls}"></div>
          ${team.team}
        </div>

        <div>${team.pj}</div>
        <div>${team.dg}</div>
        <div class="pts">${team.pts}</div>
      </div>
    `;
  });

  table.innerHTML = html;
}

// init
const select = document.getElementById("ligaSelect");

select.addEventListener("change", (e) => {
  loadLiga(e.target.value);
});

loadLiga(select.value);

</script>

</body>
</html>
