<div class="widget-svl">
    <div id="contenedor-svl">
        <p class="loading-svl">Buscando el próximo evento...</p>
    </div>
</div>

<style>
    .widget-svl {
        background: #ffffff;
        border: 1px solid #e3e3e3;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        max-width: 350px;
        margin: 10px auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        font-family: Arial, sans-serif;
    }
    .widget-svl h1 { 
        color: #333333; 
        font-size: 18px; 
        margin: 0 0 15px 0; 
        text-transform: uppercase; 
        letter-spacing: 1px;
    }
    .widget-svl .evento { 
        font-size: 18px; 
        font-weight: bold; 
        color: #e63946; 
        margin: 10px 0; 
    }
    .widget-svl .detalle { 
        color: #4a4a4a; 
        margin: 5px 0; 
        font-size: 14px; 
    }
    .widget-svl .fecha { 
        font-style: italic; 
        color: #6c757d; 
        margin-top: 12px; 
        font-size: 13px; 
    }
    .widget-svl .loading-svl { 
        color: #999; 
        font-size: 14px;
    }
</style>

<script>
    (function() {
        const CSV_URL = 'https://superligalv.github.io/SLV-Tools/calendar.csv';

        function parsearCSV(texto) {
            const lineas = texto.split('\n');
            const resultado = [];
            for (let i = 1; i < lineas.length; i++) {
                const linea = lineas[i].trim();
                if (!linea) continue; 
                const columnas = linea.split(',');
                if (columnas.length >= 4) {
                    resultado.push({
                        fechaStr: columnas[0].trim(),
                        dia: columnas[1].trim(),
                        evento: columnas[2].trim(),
                        competicion: columnas[3].trim()
                    });
                }
            }
            return resultado;
        }

        async function obtenerProximoEvento() {
            const contenedor = document.getElementById('contenedor-svl');
            if (!contenedor) return;
            
            try {
                const respuesta = await fetch(CSV_URL);
                if (!respuesta.ok) throw new Error();
                
                const textoCSV = await respuesta.text();
                const eventos = parsearCSV(textoCSV);
                
                const hoy = new Date();
                hoy.setHours(0, 0, 0, 0);

                let proximo = null;
                for (let evento of eventos) {
                    const fechaEvento = new Date(evento.fechaStr);
                    if (fechaEvento >= hoy) {
                        proximo = evento;
                        break; 
                    }
                }

                if (proximo) {
                    const opciones = { year: 'numeric', month: 'long', day: 'numeric' };
                    const fechaFormateada = new Date(proximo.fechaStr).toLocaleDateString('es-ES', opciones);

                    contenedor.innerHTML = `
                        <h1>Próximo Partido</h1>
                        <div class="evento">${proximo.evento}</div>
                        <div class="detalle"><strong>Competición:</strong> ${proximo.competicion}</div>
                        <div class="fecha">${proximo.dia}, ${fechaFormateada}</div>
                    `;
                } else {
                    contenedor.innerHTML = `<h1>Fin del Calendario</h1><p style="color:#666;font-size:14px;">No hay más eventos programados.</p>`;
                }
            } catch (error) {
                contenedor.innerHTML = `<h1>Error</h1><p style="color:#666;font-size:14px;">No se pudo cargar el calendario.</p>`;
            }
        }

        // Ejecutar con un pequeño delay para asegurar que el foro cargó el DOM
        setTimeout(obtenerProximoEvento, 200);
    })();
</script>
