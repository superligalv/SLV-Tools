<div class="widget-svl">
    <h2 class="titulo-widget">Partidos de la Semana</h2>
    <div id="contenedor-svl">
        <p class="loading-svl">Cargando calendario de la semana...</p>
    </div>
</div>

<style>
    .widget-svl {
        background: #ffffff;
        border: 1px solid #e3e3e3;
        border-radius: 8px;
        padding: 15px;
        max-width: 400px;
        margin: 10px auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        font-family: Arial, sans-serif;
    }
    .widget-svl .titulo-widget { 
        color: #333333; 
        font-size: 16px; 
        margin: 0 0 15px 0; 
        text-transform: uppercase; 
        letter-spacing: 1px;
        text-align: center;
        border-bottom: 2px solid #e63946;
        padding-bottom: 5px;
    }
    .evento-item {
        padding: 10px 5px;
        border-bottom: 1px dashed #eee;
        display: flex;
        flex-direction: column;
    }
    .evento-item:last-child {
        border-bottom: none;
    }
    .evento-header {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #6c757d;
        font-weight: bold;
    }
    .evento-nombre {
        font-size: 15px;
        font-weight: bold;
        color: #e63946;
        margin: 4px 0;
    }
    .evento-competicion {
        font-size: 13px;
        color: #4a4a4a;
    }
    .no-eventos {
        text-align: center;
        color: #666;
        font-size: 14px;
        padding: 15px 0;
    }
    .loading-svl { 
        text-align: center;
        color: #999; 
        font-size: 14px;
    }
</style>

<script>
    (function() {
        const CSV_URL = 'https://superligalv.github.io/SLV-Tools/calendar.csv';

        function parsearCSV(texto) {
            const lineas = texto.split('\n');
            const resultado = [];
            for (let i = 1; i < lineas.length; i++) {
                const linea = lineas[i].trim();
                if (!linea) continue; 
                const columnas = linea.split(',');
                if (columnas.length >= 4) {
                    resultado.push({
                        fechaStr: columnas[0].trim(),
                        dia: columnas[1].trim(),
                        evento: columnas[2].trim(),
                        competicion: columnas[3].trim()
                    });
                }
            }
            return resultado;
        }

        // Función para obtener el rango de la semana actual (Lunes a Domingo)
        function obtenerRangoSemana() {
            const hoy = new Date();
            
            // Ajustar el día de la semana (en JS, Domingo es 0, Lunes es 1...)
            const diaSemana = hoy.getDay();
            const diferenciaLunes = diaSemana === 0 ? -6 : 1 - diaSemana;
            
            const lunes = new Date(hoy);
            lunes.setDate(hoy.getDate() + diferenciaLunes);
            lunes.setHours(0, 0, 0, 0);

            const domingo = new Date(lunes);
            domingo.setDate(lunes.getDate() + 6);
            domingo.setHours(23, 59, 59, 999);

            return { lunes, domingo };
        }

        async function obtenerEventosSemana() {
            const contenedor = document.getElementById('contenedor-svl');
            if (!contenedor) return;
            
            try {
                const respuesta = await fetch(CSV_URL);
                if (!respuesta.ok) throw new Error();
                
                const textoCSV = await respuesta.text();
                const eventos = parsearCSV(textoCSV);
                
                const { lunes, domingo } = obtenerRangoSemana();
                
                // Filtrar los eventos que caen en esta semana
                const eventosSemana = eventos.filter(evento => {
                    const fechaEvento = new Date(evento.fechaStr);
                    return fechaEvento >= lunes && fechaEvento <= domingo;
                });

                if (eventosSemana.length > 0) {
                    let htmlContenido = '';
                    
                    eventosSemana.forEach(evento => {
                        const opciones = { month: 'short', day: 'numeric' };
                        const fechaFormateada = new Date(evento.fechaStr).toLocaleDateString('es-ES', opciones);
                        
                        htmlContenido += `
                            <div class="evento-item">
                                <div class="evento-header">
                                    <span>${evento.dia}</span>
                                    <span>${fechaFormateada}</span>
                                </div>
                                <div class="evento-nombre">${evento.evento}</div>
                                <div class="evento-competicion">${evento.competicion}</div>
                            </div>
                        `;
                    });
                    
                    contenedor.innerHTML = htmlContenido;
                } else {
                    contenedor.innerHTML = `<div class="no-eventos">No hay partidos programados para esta semana.</div>`;
                }
            } catch (error) {
                contenedor.innerHTML = `<div class="no-eventos" style="color:red;">Error al cargar el calendario de la semana.</div>`;
            }
        }

        setTimeout(obtenerEventosSemana, 200);
    })();
</script>
