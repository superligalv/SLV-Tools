<div class="widget-svl-horizontal">
    <div class="titulo-widget-horiz">Partidos de la Semana</div>
    <div id="contenedor-svl-horiz" class="grid-eventos">
        <p class="loading-svl">Cargando calendario de la semana...</p>
    </div>
</div>

<style>
    .widget-svl-horizontal {
        background: #ffffff;
        border: 1px solid #e3e3e3;
        border-radius: 8px;
        padding: 15px;
        margin: 10px auto;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        font-family: Arial, sans-serif;
        box-sizing: border-box;
        width: 100%;
    }
    .titulo-widget-horiz { 
        color: #333333; 
        font-size: 14px; 
        margin: 0 0 12px 0; 
        text-transform: uppercase; 
        letter-spacing: 1px;
        font-weight: bold;
        border-bottom: 2px solid #e63946;
        padding-bottom: 4px;
        display: inline-block;
    }
    .grid-eventos {
        display: flex;
        flex-direction: row;
        gap: 15px;
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 5px;
    }
    .evento-item-horiz {
        background: #fdfdfd;
        border: 1px solid #eaeaea;
        border-radius: 6px;
        padding: 10px 12px;
        flex: 1;
        min-width: 250px; /* Un poco más ancho para albergar el bloque de fecha */
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    /* Bloque Izquierdo: Textos */
    .evento-info-izq {
        display: flex;
        flex-direction: column;
        padding-right: 10px;
    }
    .evento-dia-semana {
        font-size: 11px;
        color: #888;
        font-weight: bold;
        text-transform: uppercase;
    }
    .evento-nombre-horiz {
        font-size: 14px;
        font-weight: bold;
        color: #222222;
        margin: 4px 0;
        line-height: 1.2;
    }
    .evento-competicion-horiz {
        font-size: 11px;
        color: #e63946;
        font-weight: bold;
    }
    /* Bloque Derecho: Fecha gigante */
    .evento-fecha-der {
        background: #f7f7f7;
        border-radius: 6px;
        min-width: 60px;
        padding: 6px 4px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: 1px solid #eee;
    }
    .fecha-gran-num {
        font-size: 24px;
        font-weight: 900;
        color: #333;
        line-height: 1;
    }
    .fecha-gran-mes {
        font-size: 10px;
        font-weight: bold;
        color: #666;
        text-transform: uppercase;
        margin-top: 2px;
        letter-spacing: 0.5px;
    }
    .no-eventos-horiz {
        width: 100%;
        text-align: center;
        color: #666;
        font-size: 14px;
        padding: 10px 0;
    }
    .loading-svl { 
        color: #999; 
        font-size: 14px;
    }
</style>

<script>
    (function() {
        const CSV_URL = 'https://superligalv.github.io/SLV-Tools/calendar.csv';

        function parsearCSV(texto) {
            const lineas = texto.split('\n');
            const resultado = [];
            for (let i = 1; i < lineas.length; i++) {
                const linea = lineas[i].trim();
                if (!linea) continue; 
                const columnas = linea.split(',');
                if (columnas.length >= 4) {
                    resultado.push({
                        fechaStr: columnas[0].trim(),
                        dia: columnas[1].trim(),
                        evento: columnas[2].trim(),
                        competicion: columnas[3].trim()
                    });
                }
            }
            return resultado;
        }

        function obtenerRangoSemana() {
            const hoy = new Date();
            const diaSemana = hoy.getDay();
            const diferenciaLunes = diaSemana === 0 ? -6 : 1 - diaSemana;
            
            const lunes = new Date(hoy);
            lunes.setDate(hoy.getDate() + diferenciaLunes);
            lunes.setHours(0, 0, 0, 0);

            const domingo = new Date(lunes);
            domingo.setDate(lunes.getDate() + 6);
            domingo.setHours(23, 59, 59, 999);

            return { lunes, domingo };
        }

        async function obtenerEventosSemana() {
            const contenedor = document.getElementById('contenedor-svl-horiz');
            if (!contenedor) return;
            
            try {
                const respuesta = await fetch(CSV_URL);
                if (!respuesta.ok) throw new Error();
                
                const textoCSV = await respuesta.text();
                const eventos = parsearCSV(textoCSV);
                
                const { lunes, domingo } = obtenerRangoSemana();
                
                const eventosSemana = eventos.filter(evento => {
                    const fechaEvento = new Date(evento.fechaStr);
                    return fechaEvento >= lunes && fechaEvento <= domingo;
                });

                if (eventosSemana.length > 0) {
                    let htmlContenido = '';
                    
                    eventosSemana.forEach(evento => {
                        const fechaObj = new Date(evento.fechaStr);
                        
                        // Extraemos el número del día (ej: 26)
                        const numeroDia = fechaObj.getDate();
                        
                        // Extraemos el nombre del mes corto (ej: JUNIO)
                        const nombreMes = fechaObj.toLocaleDateString('es-ES', { month: 'short' }).replace('.', '');
                        
                        htmlContenido += `
                            <div class="evento-item-horiz">
                                <div class="evento-info-izq">
                                    <span class="evento-dia-semana">${evento.dia}</span>
                                    <div class="evento-nombre-horiz">${evento.evento}</div>
                                    <div class="evento-competicion-horiz">${evento.competicion}</div>
                                </div>
                                <div class="evento-fecha-der">
                                    <span class="fecha-gran-num">${numeroDia}</span>
                                    <span class="fecha-gran-mes">${nombreMes}</span>
                                </div>
                            </div>
                        `;
                    });
                    
                    contenedor.innerHTML = htmlContenido;
                } else {
                    contenedor.innerHTML = `<div class="no-eventos-horiz">No hay partidos programados para esta semana.</div>`;
                }
            } catch (error) {
                contenedor.innerHTML = `<div class="no-eventos-horiz" style="color:red;">Error al cargar el calendario.</div>`;
            }
        }

        setTimeout(obtenerEventosSemana, 200);
    })();
</script>
